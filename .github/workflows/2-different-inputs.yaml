name: 2 - different inputs

on:
  workflow_dispatch:
    inputs:
      MySQL:
        description: "Run MySQL"
        required: false
        type: boolean
      PostgreSQL:
        description: "Run PostgreSQL"
        required: false
        type: boolean

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: MySQL fetch
        if: ${{ inputs.MySQL }}
        run: echo "I will retrieve data from MySQL"

      - name: PostgreSQL fetch
        if: ${{ inputs.PostgreSQL }}
        run: echo "I will retrieve data from PostgreSQL"

      - name: Done
        run: echo "You did it 😊"

      - name: Some Log prop.
        run: |
          echo "The name of event is ${{ github.event_name }}"
          echo "Commit SHA is ${{ github.sha }}"
          echo "Runner is ${{ runner.os }}"